<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Shadow Signal</title>
    <link rel="icon" href="data:,">

    <script src="./assetmanager.js"></script>
    <script src="./timer.js"></script>
    <script src="./animator.js"></script>
    <script src="./src/systems/input.js"></script>
    <script src="./src/systems/audio.js"></script>
    <script src="./gameengine.js"></script>
    <script src="./util.js"></script>

    <script src="./src/config/tuning.js"></script>
    <script src="./src/config/components.js"></script>

    <!-- SYSTEMS -->
    <script src="./src/systems/collision.js"></script>
    <script src="./src/systems/pathfinding.js"></script>
    <script src="./src/systems/interactions.js"></script>
    <script src="./src/systems/vision.js"></script>

    <!-- ENTITIES -->
    <script src="./src/entities/player.js"></script>
    <script src="./src/entities/guard.js"></script>
    <script src="./src/entities/controller.js"></script>
    <script src="./src/entities/level.js"></script>
    <script src="./src/entities/camera.js"></script>

    <!-- LEVELS -->
    <script src="./src/levels/testLevel.js"></script>
    <script src="./src/levels/prototypeLevel.js"></script>
    <script src="./src/levels/firstLevel.js"></script>
    <script src="./src/levels/level3.js"></script>
    <script src="./src/levels/operationNova.js"></script>

    <!-- GAME START -->
    <script src="./main.js"></script>

    <style>
        :root {
            --bg-top: #10263a;
            --bg-bottom: #223746;
            --frame-outer: #7cb8da;
            --frame-inner: #d9efff;
            --frame-glow: rgba(106, 198, 245, 0.34);
            --canvas-base: #0f1a27;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at 18% 14%, #355974 0%, var(--bg-top) 40%, var(--bg-bottom) 100%);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: clamp(8px, 1.5vw, 18px);
            box-sizing: border-box;
            font-family: "Rajdhani", "Trebuchet MS", sans-serif;
        }

        canvas {
            background-color: var(--canvas-base);
            box-sizing: border-box;
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
            outline: none;
            border-radius: 0;
            border: 1px solid rgba(124, 184, 218, 0.38);
            box-shadow: none;
        }

        @media (max-width: 768px) {
            body {
                padding: 6px;
            }

            canvas {
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameWorld" width="1024" height="768" tabindex="0" autofocus></canvas>
</body>
</html>
